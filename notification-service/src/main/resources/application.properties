spring.application.name=notification-service

server.port=8082

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.common_models.event.UserEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

app.kafka.user-events-topic=user-events

# Mail
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=noreply@localhost
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Logging
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %highlight(%-5level) - %logger{36} - %msg%n

logging.file.name=logs/app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.level.root=INFO
